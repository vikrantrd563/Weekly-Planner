<div class="page-container">

  <h2>Backlog</h2>

  <div class="action-card">

    <h3>Add Backlog Item</h3>

    <div class="form-row">

      <input
        type="text"
        placeholder="Title"
        [(ngModel)]="title"
      />

      <input
        type="text"
        placeholder="Description"
        [(ngModel)]="description"
      />

      <select [(ngModel)]="category">
        <option [value]="1">Client Focused</option>
        <option [value]="2">Tech Debt</option>
        <option [value]="3">R&amp;D</option>
      </select>

      <button class="primary" (click)="add()">Add</button>

    </div>

  </div>


  <div class="action-card">

    <h3>Backlog Items</h3>

    <table>

      <thead>
        <tr>
          <th>Title</th>
          <th>Description</th>
          <th>Category</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let item of items">

          <td>{{ item.title }}</td>

          <td>{{ item.description }}</td>

          <td>
            <span
              class="badge"
              [ngClass]="{
                'badge-client': item.category === 'ClientFocused',
                'badge-tech': item.category === 'TechDebt',
                'badge-rnd': item.category === 'RnD'
              }"
            >
              {{ item.category }}
            </span>
          </td>

          <td>{{ item.status }}</td>

          <td>
            <button class="danger" (click)="archive(item.id)">
              Archive
            </button>
          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
